name: Build and Push Add-on

on:
  push:
    branches:
      - main
    tags:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from config
        id: version
        run: |
          VERSION=$(grep -E '^version:' gitea/config.yaml | sed 's/version: "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Extract build args from build.yaml
        id: buildargs
        run: |
          BUILD_FROM=$(grep -A1 "build_from:" gitea/build.yaml | grep "amd64:" | sed 's/.*amd64: //')
          echo "BUILD_FROM=$BUILD_FROM" >> $GITHUB_OUTPUT
          GITEA_VERSION=$(grep "GITEA_VERSION:" gitea/build.yaml | sed 's/GITEA_VERSION: "//' | tr -d '"')
          echo "GITEA_VERSION=$GITEA_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64
        uses: docker/build-push-action@v5
        with:
          context: ./gitea
          file: ./gitea/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/flozsc/amd64-addon-gitea:${{ steps.version.outputs.VERSION }}
            ghcr.io/flozsc/amd64-addon-gitea:latest
          build-args: |
            BUILD_FROM=${{ steps.buildargs.outputs.BUILD_FROM }}
            BUILD_ARCH=amd64
            GITEA_VERSION=${{ steps.buildargs.outputs.GITEA_VERSION }}
          labels: |
            org.opencontainers.image.title=Home Assistant Add-on: Gitea
            org.opencontainers.image.description=Private Git service for hobby projects
            org.opencontainers.image.source=https://github.com/flozsc/my-homeassistant-apps
            org.opencontainers.image.licenses=MIT
